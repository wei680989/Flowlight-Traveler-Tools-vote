<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>流光旅人 - 賽事預測</title>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-database-compat.js"></script>
    <style>
        body {
            background: #0f1623;
            color: white;
            text-align: center;
            font-family: sans-serif;
            padding: 20px;
        }

        input {
            padding: 10px;
            border-radius: 5px;
            width: 80%;
            margin-bottom: 20px;
            font-size: 16px;
        }

        .btn {
            width: 100%;
            padding: 15px;
            margin: 10px 0;
            font-size: 18px;
            border-radius: 10px;
            border: none;
            cursor: pointer;
            font-weight: bold;
        }

        #status {
            color: #f1c40f;
            font-size: 14px;
            margin-top: 10px;
        }
    </style>
</head>

<body>
    <h2>🏆 冠軍隊伍預測</h2>
    <input type="text" id="playerID" placeholder="請輸入遊戲 ID (必填)">

    <div id="voteArea">
        <button class="btn" style="background:#2ecc71" onclick="submitVote('A')">預測 A 隊贏</button>
        <button class="btn" style="background:#3498db" onclick="submitVote('B')">預測 B 隊贏</button>
        <button class="btn" style="background:#e74c3c" onclick="submitVote('C')">預測 C 隊贏</button>
    </div>
    <div id="status"></div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyA_pq1Z2JRmFNxfz5aTTGMPGUIwtWExOJ8",
            authDomain: "ff14-pvp-poll.firebaseapp.com",
            databaseURL: "https://ff14-pvp-poll-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "ff14-pvp-poll",
            storageBucket: "ff14-pvp-poll.firebasestorage.app",
            messagingSenderId: "838002155980",
            appId: "1:838002155980:web:5405c5b702c9a650a8fd69",
            measurementId: "G-9CXM7H9JE2"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // 檢查投票是否開啟
        db.ref('settings/voteActive').on('value', (s) => {
            if (!s.val()) {
                document.getElementById('voteArea').innerHTML = "<h3>目前非投票時間</h3>";
            }
        });

        function submitVote(team) {
            const id = document.getElementById('playerID').value.trim();
            if (!id) { alert("請輸入遊戲 ID 才能投票！"); return; }

            // 使用 ID 作為 Key，會自動覆蓋舊投票（達成自由更改）
            db.ref('votes/' + id).set(team)
                .then(() => {
                    document.getElementById('status').innerText = `已成功將預測更改為: ${team} 隊`;
                });
        }
    </script>
</body>

</html>

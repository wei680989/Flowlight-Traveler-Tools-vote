<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>流光旅人 - 賽事預測</title>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-database-compat.js"></script>
    <style>
        body {
            background: #0f1623;
            color: white;
            text-align: center;
            font-family: sans-serif;
            padding: 20px;
        }

        input {
            padding: 12px;
            border-radius: 5px;
            width: 85%;
            margin-bottom: 20px;
            font-size: 16px;
            border: 1px solid #34495e;
            background: #1c2636;
            color: white;
        }

        .btn {
            width: 100%;
            padding: 15px;
            margin: 10px 0;
            font-size: 18px;
            border-radius: 10px;
            border: none;
            cursor: pointer;
            font-weight: bold;
            color: white;
            transition: 0.2s;
        }

        .btn:active {
            transform: scale(0.98);
        }

        #status {
            color: #f1c40f;
            font-size: 14px;
            margin-top: 15px;
            min-height: 20px;
        }

        #timer {
            font-size: 20px;
            color: #e74c3c;
            font-weight: bold;
            margin: 10px 0;
        }

        .card {
            background: rgba(255, 255, 255, 0.05);
            padding: 20px;
            border-radius: 15px;
        }
    </style>
</head>

<body>
    <h2>🏆 冠軍隊伍預測</h2>
    <div class="card">
        <div id="timer"></div>
        <input type="text" id="playerID" placeholder="請輸入您的遊戲 ID">
        <div id="voteArea">載入中...</div>
        <div id="status"></div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyA_pq1Z2JRmFNxfz5aTTGMPGUIwtWExOJ8",
            authDomain: "ff14-pvp-poll.firebaseapp.com",
            databaseURL: "https://ff14-pvp-poll-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "ff14-pvp-poll",
            storageBucket: "ff14-pvp-poll.firebasestorage.app",
            messagingSenderId: "838002155980",
            appId: "1:838002155980:web:5405c5b702c9a650a8fd69",
            measurementId: "G-9CXM7H9JE2"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let voteActive = false;
        let startTime = 0;
        const duration = 600;

        db.ref('settings').on('value', (s) => {
            const data = s.val();
            if (data) {
                voteActive = data.voteActive;
                startTime = data.startTime;
                updateUI();
            }
        });

        function updateUI() {
            const area = document.getElementById('voteArea');
            if (!voteActive) {
                area.innerHTML = "<h3 style='color: #95a5a6;'>🛑 目前非投票時間</h3>";
                document.getElementById('timer').innerText = "";
            } else {
                area.innerHTML = `
                    <button class="btn" style="background:#2ecc71" onclick="submitVote('A')">預測 A 隊贏</button>
                    <button class="btn" style="background:#3498db" onclick="submitVote('B')">預測 B 隊贏</button>
                    <button class="btn" style="background:#e74c3c" onclick="submitVote('C')">預測 C 隊贏</button>
                `;
            }
        }

        setInterval(() => {
            if (voteActive && startTime > 0) {
                let diff = Math.floor((Date.now() - startTime) / 1000);
                let remain = duration - diff;
                if (remain <= 0) {
                    document.getElementById('timer').innerText = "投票已結束";
                } else {
                    let m = Math.floor(remain / 60);
                    let s = remain % 60;
                    document.getElementById('timer').innerText = `⏳ 預測截止倒數: ${m}分${s}秒`;
                }
            }
        }, 1000);

        function submitVote(team) {
            const id = document.getElementById('playerID').value.trim();
            if (!id) { alert("請輸入遊戲 ID 才能投票！"); return; }

            // 使用 .set 會自動覆蓋同 ID 的舊數據
            db.ref('votes/' + id).set(team).then(() => {
                document.getElementById('status').innerText = `✅ 已更新預測: ${team} 隊 (成功覆蓋)`;
            });
        }
    </script>
</body>

</html>

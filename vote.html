<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>流光旅人 - 賽事預測</title>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-database-compat.js"></script>
    <style>
        body {
            background: #0f1623;
            color: white;
            text-align: center;
            font-family: sans-serif;
            padding: 15px;
        }

        .container {
            max-width: 500px;
            margin: auto;
        }

        input {
            padding: 12px;
            border-radius: 5px;
            width: 90%;
            margin-bottom: 15px;
            font-size: 16px;
            border: 1px solid #34495e;
            background: #1c2636;
            color: white;
        }

        .btn {
            width: 100%;
            padding: 14px;
            margin: 8px 0;
            font-size: 18px;
            border-radius: 10px;
            border: none;
            cursor: pointer;
            font-weight: bold;
            color: white;
        }

        #timer {
            font-size: 18px;
            color: #f1c40f;
            margin: 10px 0;
            font-weight: bold;
        }

        .reward-info {
            background: rgba(241, 196, 15, 0.1);
            border: 1px solid #f1c40f;
            padding: 10px;
            border-radius: 10px;
            font-size: 14px;
            color: #f39c12;
            margin-bottom: 15px;
            line-height: 1.5;
        }

        .team-box {
            background: rgba(255, 255, 255, 0.05);
            padding: 15px;
            border-radius: 15px;
            margin-top: 15px;
            text-align: left;
        }

        .team-list {
            font-size: 13px;
            color: #bdc3c7;
            margin-bottom: 10px;
            border-left: 3px solid #3498db;
            padding-left: 10px;
        }

        h4 {
            margin: 5px 0;
            color: #fff;
            font-size: 15px;
        }
    </style>
</head>

<body>
    <div class="container">
        <h2>🏆 賽事冠軍預測</h2>
        <div class="reward-info">✨ <b>預測成功獎勵</b> ✨<br>預測成功隊伍的玩家中，將使用 Google 輪盤<br>隨機抽出一位幸運兒，獲得 <b>150 水晶任意商城獎品</b>！
        </div>
        <div class="team-box">
            <div id="timer">載入中...</div>
            <input type="text" id="playerID" placeholder="請輸入您的遊戲 ID">
            <div id="voteArea"></div>
            <div id="status" style="margin-top:10px; color:#2ecc71; font-weight:bold;"></div>
        </div>
        <div class="team-box" id="teamDisplay">
            <p style="color:#95a5a6; text-align:center;">⌛ 抽籤尚未開始，請稍候...</p>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyA_pq1Z2JRmFNxfz5aTTGMPGUIwtWExOJ8",
            authDomain: "ff14-pvp-poll.firebaseapp.com",
            databaseURL: "https://ff14-pvp-poll-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "ff14-pvp-poll",
            storageBucket: "ff14-pvp-poll.firebasestorage.app",
            messagingSenderId: "838002155980",
            appId: "1:838002155980:web:5405c5b702c9a650a8fd69",
            measurementId: "G-9CXM7H9JE2"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        let voteActive = false; let startTime = 0;

        db.ref('settings').on('value', (s) => {
            const data = s.val();
            if (data) { voteActive = data.voteActive; startTime = data.startTime; updateUI(); }
        });

        db.ref('currentTeams').on('value', (s) => {
            const t = s.val();
            const display = document.getElementById('teamDisplay');
            if (t) {
                display.innerHTML = `
                    <h4 style="color:#2ecc71">🟢 隊伍 A 成員</h4><div class="team-list">${t.A.join('、')}</div>
                    <h4 style="color:#3498db">🔵 隊伍 B 成員</h4><div class="team-list">${t.B.join('、')}</div>
                    <h4 style="color:#e74c3c">🔴 隊伍 C 成員</h4><div class="team-list">${t.C.join('、')}</div>`;
            }
        });

        function updateUI() {
            const area = document.getElementById('voteArea');
            if (!voteActive) {
                area.innerHTML = "<h3 style='color: #95a5a6;'>🛑 抽選進行中，預測尚未開啟</h3>";
                document.getElementById('timer').innerText = "等待系統開啟...";
            } else {
                area.innerHTML = `
                    <button class="btn" style="background:#2ecc71" onclick="submitVote('A')">預測 A 隊奪冠</button>
                    <button class="btn" style="background:#3498db" onclick="submitVote('B')">預測 B 隊奪冠</button>
                    <button class="btn" style="background:#e74c3c" onclick="submitVote('C')">預測 C 隊奪冠</button>`;
            }
        }

        setInterval(() => {
            if (voteActive && startTime > 0) {
                let remain = 600 - Math.floor((Date.now() - startTime) / 1000);
                if (remain <= 0) document.getElementById('timer').innerText = "🛑 預測截止";
                else document.getElementById('timer').innerText = `⏳ 截止倒數: ${Math.floor(remain / 60)}分${remain % 60}秒`;
            }
        }, 1000);

        function submitVote(team) {
            const id = document.getElementById('playerID').value.trim();
            if (!id) { alert("請輸入遊戲 ID！"); return; }
            db.ref('votes/' + id).set(team).then(() => {
                document.getElementById('status').innerText = `✅ 預測成功: ${team} 隊！`;
            });
        }
    </script>
</body>

</html>
